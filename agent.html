var FALLBACK = "That one's beyond my script — I'm a scripted concierge grounded in site content, not a live model. For a real answer from the founder: <a href='mailto:raj@synarka.pro'>raj@synarka.pro</a> or <a href='https://cal.com/raj-aaa/synarka' target='_blank' rel='noopener'>book 15 minutes</a>. Meanwhile, try one of the chips below.";
var CHIPS = ["What does it cost?","How does the engine work?","Show me the proof","Critical minerals","Defence","I'm an investor","How do I start free?","Contact Raj"];
var PRESET = {minerals:'Critical minerals',government:'Government &amp; policy',defence:'Defence',agriculture:'Agriculture',infrastructure:'Infrastructure',investor:"I'm an investor"};

var voiceOn=false;
function toggleVoice(){voiceOn=!voiceOn;var b=document.getElementById('voiceBtn');
  b.classList.toggle('on',voiceOn);b.innerHTML=voiceOn?'&#128266; READ ALOUD: ON':'&#128264; READ ALOUD: OFF';
  if(!voiceOn&&window.speechSynthesis)speechSynthesis.cancel();}
function speak(html){try{if(!voiceOn||!window.speechSynthesis)return;
  var t=html.replace(/<[^>]+>/g,' ').replace(/&[a-z]+;/g,' ').replace(/\s+/g,' ');
  var u=new SpeechSynthesisUtterance(t);u.lang='en-AU';u.rate=1.02;
  var v=speechSynthesis.getVoices().filter(function(x){return x.lang==='en-AU';})[0];if(v)u.voice=v;
  speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
function add(who,html){var c=document.getElementById('chat');var d=document.createElement('div');
  d.className='msg '+(who==='DESK'?'desk':'you');
  d.innerHTML='<div class="who">'+who+'</div><div class="body">'+html+'</div>';
  c.appendChild(d);c.scrollTop=c.scrollHeight;if(who==='DESK')speak(html);}
function answer(q){var s=q.toLowerCase(),best=null,score=0;
  BRAIN.forEach(function(b){var n=0;b.k.forEach(function(k){if(s.indexOf(k)>-1)n+=k.length;});
    if(n>score){score=n;best=b;}});
  return best?best.a:FALLBACK;}
function ask(chip){var i=document.getElementById('q');var q=chip||i.value.trim();if(!q)return;
  i.value='';add('YOU',q.replace(/</g,'&lt;'));
  setTimeout(function(){add('DESK',answer(q));},380);}
(function(){try{
  var chips=document.getElementById('chips');
  CHIPS.forEach(function(c){var b=document.createElement('button');b.className='chip';b.innerHTML=c;
    b.onclick=function(){ask(c.replace(/&amp;/g,'&'));};chips.appendChild(b);});
  add('DESK',"G'day — this is <strong>the Desk</strong>, synARKa's concierge. Ask about pricing, the eight-engine method, any of the five domains, or the proof. I'm scripted and grounded in site content only — for anything deeper, the founder is one email away.");
  var p=new URLSearchParams(location.search).get('i');
  if(p&&PRESET[p])setTimeout(function(){ask(PRESET[p].replace(/&amp;/g,'&'));},700);
}catch(e){}})();
